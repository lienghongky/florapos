name: Build & Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ── Build API ─────────────────────
      - name: Build API image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/saas-pos-api:latest -f apps/api/Dockerfile .

      - name: Push API image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/saas-pos-api:latest

      # ── Build WEB ─────────────────────
      - name: Build Web image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/saas-pos-web:latest -f apps/web/Dockerfile .

      - name: Push Web image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/saas-pos-web:latest

      # ── Deploy to Server ──────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "🔐 Login to GHCR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📂 Go to project directory"
            cd ~/florapos

            echo "🔄 Pull latest docker-compose + config"
            git pull origin main

            echo "📦 Pull latest images"
            docker compose pull

            echo "🚀 Restart containers"
            docker compose up -d --remove-orphans

            echo "🧹 Cleanup unused images"
            docker image prune -f